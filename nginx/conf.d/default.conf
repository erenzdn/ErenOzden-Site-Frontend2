# ==============================================================================
# ERENOZDEN-FRONTEND - Nginx Site Configuration
# ==============================================================================

# Upstream Next.js application
upstream nextjs_upstream {
    server frontend:3000;
    keepalive 64;
}

# HTTP to HTTPS redirect (SSL kullanıyorsanız)
server {
    listen 80;
    server_name mehmeterenozden.com www.mehmeterenozden.com;

    # Health check endpoint (Docker healthcheck için)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Acme challenge (Let's Encrypt için)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTPS yönlendirmesi (SSL kurulumu sonrası aktif edin)
    # location / {
    #     return 301 https://$server_name$request_uri;
    # }

    # SSL olmadan doğrudan proxy (geliştirme için)
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;
    }
}

